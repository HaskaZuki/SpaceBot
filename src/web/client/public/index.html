<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="description" content="SpaceBot - The ultimate Discord music bot with crystal-clear audio, smart queue management, and powerful premium features. Join millions of servers worldwide and elevate your community with seamless music playback, custom filters, 24/7 mode, and a stunning web dashboard. Start using SpaceBot today and transform your Discord server experience!" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link id="favicon" rel="icon" type="image/png" href="/favicon.ico" />
    <title>SpaceBot - The Ultimate Discord Music Bot</title>
    <script>
      // Dynamically set favicon to bot avatar
      (function() {
        fetch('/api/bot-info')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && data.avatarUrl) {
              var link = document.getElementById('favicon');
              if (link) link.href = data.avatarUrl;
            }
          })
          .catch(function() {});
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
